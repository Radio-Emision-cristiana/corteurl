<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Monitor - Panel de Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .login-container, .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .login-container {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-box h1 { color: #00d4ff; margin-bottom: 10px; font-size: 28px; }
        .login-box p { color: #888; margin-bottom: 30px; }
        .code-input {
            display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;
        }
        .code-input input {
            width: 50px; height: 60px; text-align: center;
            font-size: 24px; font-weight: bold;
            background: #0f0f1a; border: 2px solid #333;
            border-radius: 10px; color: #00d4ff;
            transition: all 0.3s;
        }
        .code-input input:focus { border-color: #00d4ff; outline: none; box-shadow: 0 0 20px rgba(0,212,255,0.3); }
        .btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000; border: none; padding: 14px 40px;
            border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.4); }
        .btn-danger { background: linear-gradient(135deg, #ff4757, #c0392b); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; }
        .btn-sm { padding: 8px 16px; font-size: 13px; }
        .error-msg { color: #ff4757; margin-top: 15px; }
        .hidden { display: none !important; }

        /* App Layout */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 30px;
        }
        .header h1 { color: #00d4ff; display: flex; align-items: center; gap: 10px; }
        .header h1 svg { width: 32px; height: 32px; }
        .logout-btn { background: transparent; border: 1px solid #ff4757; color: #ff4757; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .logout-btn:hover { background: #ff4757; color: #fff; }

        /* Sections */
        .section {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .section-title { color: #00d4ff; margin-bottom: 20px; font-size: 18px; display: flex; align-items: center; gap: 10px; }

        /* Forms */
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; color: #888; margin-bottom: 8px; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px 15px;
            background: #0f0f1a; border: 1px solid #333;
            border-radius: 8px; color: #fff; font-size: 14px;
        }
        .form-group input:focus { border-color: #00d4ff; outline: none; }

        /* Search */
        .search-box {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .search-box input {
            flex: 1; padding: 12px 20px;
            background: #0f0f1a; border: 1px solid #333;
            border-radius: 8px; color: #fff;
        }

        /* Table */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #00d4ff; font-weight: 600; background: rgba(0,0,0,0.3); }
        tr:hover { background: rgba(0,212,255,0.05); }

        /* Status badges */
        .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-online { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .status-offline { background: rgba(255,71,87,0.2); color: #ff4757; }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }

        /* Mirror URL */
        .mirror-url {
            background: #0f0f1a; padding: 8px 12px; border-radius: 6px;
            font-family: monospace; font-size: 12px; color: #00d4ff;
            word-break: break-all; cursor: pointer;
            border: 1px dashed #333;
        }
        .mirror-url:hover { border-color: #00d4ff; }

        /* Actions */
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: #2ecc71; color: #fff;
            padding: 15px 25px; border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        .toast.error { background: #ff4757; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Preview */
        .preview-box {
            background: #0f0f1a; border: 1px solid #333;
            border-radius: 8px; padding: 15px; margin-top: 15px;
        }
        .preview-label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .preview-url { color: #00d4ff; font-family: monospace; word-break: break-all; }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row { flex-direction: column; }
            .actions { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1>🛰️ M3U Monitor</h1>
            <p>Ingresa el código de acceso de 6 dígitos</p>
            <div class="code-input" id="codeInputs">
                <input type="text" maxlength="1" data-index="0" autofocus>
                <input type="text" maxlength="1" data-index="1">
                <input type="text" maxlength="1" data-index="2">
                <input type="text" maxlength="1" data-index="3">
                <input type="text" maxlength="1" data-index="4">
                <input type="text" maxlength="1" data-index="5">
            </div>
            <button class="btn" onclick="login()">Acceder</button>
            <p id="loginError" class="error-msg hidden"></p>
        </div>
    </div>

    <!-- App Screen -->
    <div id="appScreen" class="app-container hidden">
        <header class="header">
            <h1>
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                M3U Monitor
            </h1>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </header>

        <!-- Configuración de Dominio -->
        <div class="section">
            <h2 class="section-title">⚙️ Configuración de Dominio</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre de Dominio (sin https://)</label>
                    <input type="text" id="domainName" placeholder="tu-app.onrender.com">
                </div>
                <div class="form-group">
                    <label>Alias de Ruta</label>
                    <input type="text" id="aliasPath" placeholder="m3u">
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button class="btn" onclick="saveConfig()">Guardar Configuración</button>
                </div>
            </div>
            <div class="preview-box">
                <div class="preview-label">Vista previa de URL espejo:</div>
                <div class="preview-url" id="urlPreview">https://tu-app.onrender.com/m3u/[slug].m3u</div>
            </div>
        </div>

        <!-- Agregar Nueva URL -->
        <div class="section">
            <h2 class="section-title">➕ Agregar Nueva URL M3U</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="userName" placeholder="Ej: usuario1">
                </div>
                <div class="form-group">
                    <label>URL M3U Original</label>
                    <input type="text" id="originalUrl" placeholder="http://ejemplo.com/lista.m3u">
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button class="btn btn-success" onclick="addUrl()">Agregar URL</button>
                </div>
            </div>
        </div>

        <!-- Listado de URLs -->
        <div class="section">
            <h2 class="section-title">📋 URLs Registradas</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar por usuario...">
                <button class="btn" onclick="searchUrls()">Buscar</button>
                <button class="btn" style="background: #333; color: #fff;" onclick="loadUrls()">Ver Todos</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>URL Espejo</th>
                            <th>Estado</th>
                            <th>Canales</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="urlsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let accessCode = '';

        // Code input handling
        document.querySelectorAll('.code-input input').forEach((input, index, inputs) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                updateCode();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
                if (e.key === 'Enter') login();
            });
        });

        function updateCode() {
            accessCode = Array.from(document.querySelectorAll('.code-input input'))
                .map(i => i.value).join('');
        }

        async function login() {
            updateCode();
            if (accessCode.length !== 6) {
                showError('Ingresa los 6 dígitos');
                return;
            }
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: accessCode })
                });
                if (res.ok) {
                    localStorage.setItem('accessCode', accessCode);
                    showApp();
                } else {
                    showError('Código incorrecto');
                }
            } catch (e) {
                showError('Error de conexión');
            }
        }

        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            loadConfig();
            loadUrls();
        }

        function logout() {
            localStorage.removeItem('accessCode');
            location.reload();
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'x-access-code': localStorage.getItem('accessCode')
            };
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/config', { headers: getHeaders() });
                const config = await res.json();
                document.getElementById('domainName').value = config.domain_name || '';
                document.getElementById('aliasPath').value = config.alias || 'm3u';
                updatePreview();
            } catch (e) { console.error(e); }
        }

        async function saveConfig() {
            const domain_name = document.getElementById('domainName').value;
            const alias = document.getElementById('aliasPath').value;
            try {
                await fetch('/api/config', {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify({ domain_name, alias })
                });
                showToast('Configuración guardada');
                loadUrls();
            } catch (e) { showToast('Error al guardar', true); }
        }

        function updatePreview() {
            const domain = document.getElementById('domainName').value || 'tu-dominio.com';
            const alias = document.getElementById('aliasPath').value || 'm3u';
            document.getElementById('urlPreview').textContent = `https://${domain}/${alias}/[slug].m3u`;
        }

        document.getElementById('domainName').addEventListener('input', updatePreview);
        document.getElementById('aliasPath').addEventListener('input', updatePreview);

        async function loadUrls() {
            document.getElementById('searchInput').value = '';
            await fetchUrls('');
        }

        async function searchUrls() {
            const search = document.getElementById('searchInput').value;
            await fetchUrls(search);
        }

        async function fetchUrls(search) {
            try {
                const url = search ? `/api/urls?search=${encodeURIComponent(search)}` : '/api/urls';
                const res = await fetch(url, { headers: getHeaders() });
                const urls = await res.json();
                renderTable(urls);
            } catch (e) { console.error(e); }
        }

        function renderTable(urls) {
            const tbody = document.getElementById('urlsTable');
            if (urls.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">No hay URLs registradas</td></tr>';
                return;
            }
            tbody.innerHTML = urls.map(u => `
                <tr>
                    <td><strong>${escapeHtml(u.user_name)}</strong></td>
                    <td>
                        <div class="mirror-url" onclick="copyUrl('${escapeHtml(u.mirror_url)}')" title="Click para copiar">
                            ${escapeHtml(u.mirror_url)}
                        </div>
                    </td>
                    <td><span class="status status-${u.status}">${u.status.toUpperCase()}</span></td>
                    <td>${u.channel_count || 0}</td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-sm btn-success" onclick="checkUrl(${u.id})">Verificar</button>
                            <button class="btn btn-sm" onclick="downloadUrl(${u.id})">Descargar</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteUrl(${u.id})">Eliminar</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function addUrl() {
            const user_name = document.getElementById('userName').value.trim();
            const original_url = document.getElementById('originalUrl').value.trim();
            if (!user_name || !original_url) {
                showToast('Completa todos los campos', true);
                return;
            }
            try {
                const res = await fetch('/api/urls', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ user_name, original_url })
                });
                if (res.ok) {
                    document.getElementById('userName').value = '';
                    document.getElementById('originalUrl').value = '';
                    showToast('URL agregada correctamente');
                    loadUrls();
                } else {
                    showToast('Error al agregar URL', true);
                }
            } catch (e) { showToast('Error de conexión', true); }
        }

        async function checkUrl(id) {
            try {
                showToast('Verificando...');
                const res = await fetch(`/api/urls/${id}/check`, {
                    method: 'POST',
                    headers: getHeaders()
                });
                const data = await res.json();
                showToast(`Estado: ${data.status.toUpperCase()} - ${data.channel_count} canales`);
                loadUrls();
            } catch (e) { showToast('Error al verificar', true); }
        }

        async function downloadUrl(id) {
            try {
                const res = await fetch(`/api/urls/${id}/download`, { headers: getHeaders() });
                const blob = await res.blob();
                const disposition = res.headers.get('Content-Disposition');
                let filename = 'lista.m3u';
                if (disposition) {
                    const match = disposition.match(/filename="(.+)"/);
                    if (match) filename = match[1];
                }
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                window.URL.revokeObjectURL(url);
                showToast('Descarga iniciada');
            } catch (e) { showToast('Error al descargar', true); }
        }

        async function deleteUrl(id) {
            if (!confirm('¿Eliminar esta URL?')) return;
            try {
                await fetch(`/api/urls/${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                showToast('URL eliminada');
                loadUrls();
            } catch (e) { showToast('Error al eliminar', true); }
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url);
            showToast('URL copiada al portapapeles');
        }

        function showToast(msg, isError = false) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Check if already logged in
        if (localStorage.getItem('accessCode')) {
            accessCode = localStorage.getItem('accessCode');
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: accessCode })
            }).then(res => {
                if (res.ok) showApp();
                else localStorage.removeItem('accessCode');
            });
        }

        // Enter to search
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchUrls();
        });
    </script>
</body>
</html>
